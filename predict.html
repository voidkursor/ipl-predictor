<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Predictor</title> 
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h1>Predict</h1>  <!-- change this per page -->

    <nav>
    <div id="nav-links">
        <a href="index.html">Matches</a>
        <a href="predict.html">Predict</a>
        <a href="leaderboard.html">LeaderBoard</a>
    </div>
       <div id="auth-section">
        <span id="userInfo"></span>
        <button id="loginBtn">Sign in with Google</button>
        <button id="logoutBtn" style="display:none;">Logout</button>
    </div>
    </nav>

    <div id="predict-container">
        <div id="match-info">
            <h2 id="match-title">Loading match ...</h2>
            <p id="match-date"></p>
            <p id="match-venue"></p>
        </div>

        <div id="prediction-form">
            <div class="form-group">
                <h3>Who Will Win?</h3>
                <div id="winner-options" class="radio-group"></div>
            </div>
            <div class="form-group">
                <h3>Man of the Match</h3>
                <p id="selected-mom-display" class="selected-player">No Player selected</p>
                <div id="mom-grid" class="player-grid"></div>
            </div>
            <button id="submitBtn">Submit Prediction</button>
            <p id="form-message"></p>
    </div>

    <script type="module" src="js/predict.js"></script>
</body>
</html>
